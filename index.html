<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive map builder</title>
    <link rel="stylesheet" href="styles/css_reset.css" />
    <link rel="stylesheet" href="styles/app.css" />
    <script type="module" src="scripts/app.js"></script>
</head>

<body>
    <div class="page">
        <header class="app-header">
            <div>
                <h1>Interactive map builder</h1>
                <p>Create, drag, drop, copy, paste, enjoy!</p>
            </div>
        </header>

        <main class="app-layout">
            <section class="panel stage-panel">
                <div class="panel-header">
                    <div>
                        <h2>Stage editor</h2>
                        <p class="panel-subtitle">Map preview and category filtering</p>
                    </div>
                </div>

                <div id="stage-tabs-root"></div>

                <div id="stage-root"></div>
            </section>

            <aside class="panel builder-panel">
                <div class="panel-header">
                    <div>
                        <h2>Builder</h2>
                        <p class="panel-subtitle">Categories and items</p>
                    </div>
                    <div class="panel-actions">
                        <button id="add-category-btn" type="button">Add category</button>
                    </div>
                </div>

                <div id="builder-root"></div>

                <div class="panel-header">
                    <div>
                        <h2>Export</h2>
                        <p class="panel-subtitle">Generate CMS-ready code</p>
                    </div>
                    <div class="panel-actions">
                        <button id="save-json-btn" type="button">Save JSON</button>
                        <button id="load-json-btn" type="button">Load JSON</button>
                        <button id="generate-code-btn" type="button">Generate code</button>
                        <input id="load-json-input" type="file" accept="application/json,.json" hidden />
                    </div>
                </div>

                <div id="export-root" style="padding: 18px;">
                    <textarea id="generated-code-output" rows="18"
                        placeholder="Generated code will appear here..."></textarea>
                </div>
            </aside>
        </main>
    </div>
</body>

</html>
